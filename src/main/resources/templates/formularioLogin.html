<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
     <form th:method="POST" th:action="@{/resultadoLogin}">
        <label for="valor">Nome de usuário: </label>
        <input type="text" th:name="nome">
        <br>
        <label for="parcelas">Senha: </label>
        <input type="password" th:name="senha">
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
