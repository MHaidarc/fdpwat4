<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empréstimo</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Valor do Empréstimo</th>
            <th>Taxa de juros</th>
            <th>Quantidade de parcelas</th>
            <th>Valor Final das parcelas</th>
        </tr>
        <tr>
            <td>R$[[${valor}]]</td>
            <td>[[${juros}]]%</td>
            <td>[[${parcelas}]]</td>
            <td>R$[[${valorParcela}]]</td>
        </tr>
    </table>
</body>
</html>
